name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Increase Kotlin/Native heap size
      run: echo -e "\norg.jetbrains.kotlin.native.memoryMaxHeapSize=12g" >> gradle.properties

    - name: Increase heap size
      run: echo "kotlin.daemon.jvmargs=-Xmx11g" >> gradle.properties
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug
